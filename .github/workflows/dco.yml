name: DCO

# Verifies every commit in a pull request carries a Developer Certificate of
# Origin sign-off ("Signed-off-by:", added with `git commit -s`). Replaces the
# former CLA Assistant bot. See the DCO file and CONTRIBUTING.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  # Run JS-based actions on Node 24 (Node 20 is deprecated on GH runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dco:
    name: Check DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Every commit must be signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          base="$BASE_SHA"
          head="$HEAD_SHA"
          fail=0
          for sha in $(git rev-list "$base..$head"); do
            subject=$(git log -1 --format='%s' "$sha")
            if ! git log -1 --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit ${sha} (\"${subject}\") is missing a Signed-off-by line."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more commits are missing a DCO sign-off."
            echo "Fix the last commit:   git commit --amend -s"
            echo "Fix a whole branch:    git rebase --signoff origin/main"
            echo "See CONTRIBUTING.md and the DCO file for what you're certifying."
            exit 1
          fi
          echo "All commits carry a DCO sign-off."
