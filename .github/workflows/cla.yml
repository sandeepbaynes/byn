name: CLA Assistant

# Gates every PR on a signed CLA. Contributors sign by commenting the exact
# phrase below; signatures are recorded in .github/cla-signatures/v1.json.
#
# Security note: this uses `pull_request_target` (needed so the bot can comment
# and set a status on PRs from forks). It does NOT check out or run any PR code,
# and reads no untrusted input into a shell — so there is no injection surface.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures/v1.json'
          path-to-document: 'https://github.com/sandeepbaynes/byn/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'sandeepbaynes,dependabot[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >-
            Thanks for the pull request! Before it can be merged, please read our
            [Contributor License Agreement](https://github.com/sandeepbaynes/byn/blob/main/CLA.md)
            and sign it by posting a comment containing exactly:
