# GoReleaser config for byn — https://goreleaser.com
# Validate:  goreleaser check
# Dry run:   goreleaser release --snapshot --clean
# Real run:  git tag v0.0.1 && git push --tags   (CI does the rest)
#
# Produces per-platform tar.gz archives named byn-<os>-<arch>.tar.gz (binary +
# man page + LICENSE) + a byn-<version>.sha256 manifest — the names install.sh
# and packaging/aur/PKGBUILD expect.
version: 2

project_name: byn

before:
  hooks:
    - go mod tidy

builds:
  - id: byn
    main: ./cmd/byn
    binary: byn
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.buildDate={{ .CommitDate }}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: byn
    formats: [tar.gz]
    name_template: 'byn-{{ .Os }}-{{ .Arch }}'
    # Bundle the man page + license alongside the binary so Homebrew, the curl
    # installer, and AUR can install `man byn` — not just the deb/rpm/apk.
    files:
      - man/byn.1
      - LICENSE
      - README.md

checksum:
  name_template: "byn-{{ .Version }}.sha256"
  algorithm: sha256

# Linux packages: deb (Debian/Ubuntu), rpm (Fedora/RHEL), apk (Alpine).
nfpms:
  - id: byn
    package_name: byn
    vendor: Sandeep Baynes
    homepage: https://github.com/sandeepbaynes/byn
    maintainer: Sandeep Baynes
    description: "Local-first secure secrets vault and credential manager."
    license: "BUSL-1.1"
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    section: utils
    contents:
      - src: man/byn.1
        dst: /usr/share/man/man1/byn.1
      - src: LICENSE
        dst: /usr/share/doc/byn/LICENSE

# Homebrew: auto-update the formula in your tap. Needs a HOMEBREW_TAP_GITHUB_TOKEN
# secret (a PAT that can push to sandeepbaynes/homebrew-tap). This generated
# formula replaces the old hand-written one (now removed).
#
# NOTE: GoReleaser deprecated `brews` in favour of `homebrew_casks`, but casks
# are macOS-only — a formula covers Linux Homebrew too. We keep `brews` for
# cross-platform coverage until GoReleaser offers a cross-platform replacement.
brews:
  - name: byn
    repository:
      owner: sandeepbaynes
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/sandeepbaynes/byn
    description: "Local-first secure secrets vault and credential manager."
    license: "BUSL-1.1"
    # GoReleaser does not auto-detect the bundled man page, so install it
    # explicitly (path is relative to the extracted archive root).
    extra_install: |
      man1.install "man/byn.1"
    test: |
      assert_match "byn #{version}", shell_output("#{bin}/byn version")
    skip_upload: auto

release:
  github:
    owner: sandeepbaynes
    name: byn
  draft: false
  prerelease: auto
  name_template: "byn {{ .Version }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"

